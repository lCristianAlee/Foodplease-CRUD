<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>FoodPlease — Web Pública</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #0F0F12; font-family: 'Inter', -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; color: #fff; }
  #root { min-height: 100vh; }
  ::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="screens/icons.jsx"></script>
<script type="text/babel" src="screens/shared.jsx"></script>
<script type="text/babel" src="screens/auth.jsx"></script>
<script type="text/babel" src="screens/home.jsx"></script>
<script type="text/babel" src="screens/detail.jsx"></script>
<script type="text/babel" src="screens/cart.jsx"></script>
<script type="text/babel" src="screens/tracking.jsx"></script>
<script type="text/babel" src="screens/profile.jsx"></script>
<script type="text/babel" src="screens/web.jsx"></script>
<script type="text/babel">
function WebApp() {
  return (
    <DesignCanvas>
      <DCSection id="web" title="FoodPlease — Web Pública (Desktop)"
        subtitle="1440 × altura natural · idéntica identidad visual que el mobile · click en cualquier frame para abrirlo en focus mode">
        <DCArtboard id="w1" label="W1 · Home / Menú" width={1440} height={2000}>
          <WebHome/>
        </DCArtboard>
        <DCArtboard id="w2" label="W2 · Detalle del plato" width={1440} height={1900}>
          <WebDetail/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<WebApp/>);
</script>
</body>
</html>
