{# Header sticky con marca, navegacion y CTA. Acepta var `nav_active` (string) #}
<header class="site-header">
    <div class="site-header__inner">
        <a href="{% url 'menu:lista' %}" class="brand">
            {% include 'menu/partials/_brand_logo.html' %}
        </a>
        <nav class="site-header__nav" aria-label="Navegación principal">
            <a href="{% url 'menu:lista' %}" {% if nav_active == 'menu' %}class="is-active"{% endif %}>Menú</a>
            <a href="#sucursales">Sucursales</a>
            <a href="#nosotros">Sobre nosotros</a>
            <a href="#contacto">Contacto</a>
        </nav>
        <a href="#descargar" class="btn btn--primary">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                <path d="M7 1v9m0 0L4 7m3 3l3-3M2 12h10"
                      stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Descargar app
        </a>
    </div>
</header>
